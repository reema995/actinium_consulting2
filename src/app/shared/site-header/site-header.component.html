<header class="sticky left-0 right-0 top-0 z-50 bg-white shadow-md transition-all duration-300">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-20 items-center justify-between md:h-24" [ngClass]="isArabic() ? 'md:flex-row-reverse' : ''">
      <a class="flex shrink-0 items-center transition-transform hover:scale-105" routerLink="/">
        <img alt="Actinium Logo" class="h-16 w-auto object-contain md:h-20" src="/assets/logo.jpg" />
      </a>

      <nav class="hidden h-full items-center space-x-2 md:flex lg:space-x-6" [ngClass]="isArabic() ? 'md:flex-row-reverse md:space-x-reverse lg:space-x-reverse' : ''">
        <a
          *ngFor="let item of navItems()"
          class="group relative flex h-full items-center px-3 text-[15px] font-bold transition-colors"
          [routerLink]="item.path"
          [ngClass]="isActive(item.path) ? 'text-[#1d2858]' : 'text-gray-500 hover:text-[#1d2858]'"
        >
          {{ item.label }}
          <span
            class="absolute bottom-0 h-[4px] rounded-t-md bg-[#1d2858] transition-all duration-300 ease-out"
            [ngClass]="
              isActive(item.path)
                ? 'left-1/2 w-[calc(100%-1.5rem)] -translate-x-1/2 opacity-100'
                : 'left-1/2 w-0 -translate-x-1/2 opacity-0 group-hover:w-[calc(100%-1.5rem)] group-hover:opacity-100'
            "
          ></span>
        </a>

        <button
          type="button"
          class="rounded-full border border-[#1d2858]/15 bg-[#1d2858]/5 px-4 py-2 text-sm font-semibold text-[#1d2858] shadow-none transition-colors hover:bg-[#1d2858] hover:text-white"
          (click)="toggleLanguage()"
        >
          {{ header().switchLanguage }}
        </button>
      </nav>

      <div class="flex items-center gap-2 md:hidden">
        <button
          type="button"
          class="rounded-full border border-[#1d2858]/15 bg-[#1d2858]/5 px-3 py-2 text-xs font-semibold text-[#1d2858] shadow-none"
          (click)="toggleLanguage()"
        >
          {{ header().switchLanguage }}
        </button>

        <button
          type="button"
          class="inline-flex items-center justify-center rounded-md p-2 text-gray-700 hover:bg-gray-100 hover:text-[#1d2858] focus:outline-none"
          (click)="toggleMobileMenu()"
          [attr.aria-label]="header().toggleNavigationLabel"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="mobileMenuOpen" class="border-t border-gray-100 pb-4 pt-2 md:hidden" [class.text-right]="isArabic()">
      <nav class="flex flex-col space-y-1 px-2">
        <a
          *ngFor="let item of navItems()"
          class="block rounded-lg px-4 py-3 text-[15px] font-bold transition-all duration-300"
          [routerLink]="item.path"
          [ngClass]="
            isActive(item.path)
              ? isArabic()
                ? 'bg-[#1d2858]/5 text-[#1d2858] -translate-x-1 border-r-4 border-[#1d2858]'
                : 'bg-[#1d2858]/5 text-[#1d2858] translate-x-1 border-l-4 border-[#1d2858]'
              : isArabic()
                ? 'text-gray-500 hover:bg-gray-50 hover:text-[#1d2858] border-r-4 border-transparent hover:-translate-x-1'
                : 'text-gray-500 hover:bg-gray-50 hover:text-[#1d2858] border-l-4 border-transparent hover:translate-x-1'
          "
        >
          {{ item.label }}
        </a>
      </nav>
    </div>
  </div>
</header>
